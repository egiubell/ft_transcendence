version: '3.8'

services:
  transcendence:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: pong-webapp
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
    restart: unless-stopped
    user: "1001:1001"
    networks:
      - pong-network

networks:
  pong-network:
    driver: bridge