        <main id="content-area">
            <!-- Auth Screen (Login/Signup) -->
            <div id="auth-screen" class="screen active">
                <div class="auth-container">
                    <h1 class="auth-title">🏓 Pong Tournament</h1>
                    
                    <!-- Login Form -->
                    <form id="login-form" class="auth-form active">
                        <h2>Login</h2>
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="primary-btn">Login</button>
                        <p class="form-toggle">
                            Don't have an account? <a href="#" onclick="toggleAuthForm(); return false;">Sign up</a>
                        </p>
                        <div id="login-error" class="error-message"></div>
                    </form>

                    <!-- Signup Form -->
                    <form id="signup-form" class="auth-form">
                        <h2>Create Account</h2>
                        <div class="form-group">
                            <label for="signup-email">Email</label>
                            <input type="email" id="signup-email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-username">Username</label>
                            <input type="text" id="signup-username" placeholder="your_username" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-confirm">Confirm Password</label>
                            <input type="password" id="signup-confirm" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="primary-btn">Sign Up</button>
                        <p class="form-toggle">
                            Already have an account? <a href="#" onclick="toggleAuthForm(); return false;">Login</a>
                        </p>
                        <div id="signup-error" class="error-message"></div>
                    </form>
                </div>
            </div>
            
            <div id="welcome-screen" class="screen">
                <h2>Welcome to Pong Tournament!</h2>
                <div class="user-info-bar">
                    <span id="current-user-display">Loading...</span>
                    <button id="logout-btn" class="secondary-btn">Logout</button>
                </div>
                <button id="start-tournament-btn" class="primary-btn">Start New Tournament</button>
                <button id="quick-game-btn" class="secondary-btn">Multiplayer Quick Game</button>
                <button id="single-player-btn" class="secondary-btn">Single Player</button>
                <button id="stats-btn" class="secondary-btn">View Stats</button>
            </div>
            
            <div id="tournament-setup" class="screen">
                <h2>Tournament Setup</h2>
                <div id="player-registration">
                    <input type="text" id="player-alias" placeholder="Enter your alias">
                    <button id="add-player-btn">Add Player</button>
                </div>
                <div id="registered-players"></div>
                <button id="begin-tournament-btn" disabled>Begin Tournament</button>
            </div>
            
            <div id="game-arena" class="screen">
                <div id="game-info">
                    <span id="player1-name">Player 1</span>
                    <span id="game-score">0 - 0</span>
                    <span id="player2-name">Player 2</span>
                </div>
                <canvas id="pong-canvas" width="800" height="400"></canvas>
                <div id="game-controls">
                    <p>Player 1: W/S keys | Player 2: Arrow Up/Down keys</p>
                    <button id="exit-match-btn" class="secondary-btn">Exit Match</button>
                </div>
            </div>
            
            <div id="tournament-bracket" class="screen">
                <h2>Tournament bracket</h2>
                <div id="bracket-display"></div>
                <button id="next-match-btn">Start Next Match</button>
            </div>
            
            <div id="stats-screen" class="screen">
                <h2>Match Statistics</h2>
                <div id="stats-container">
                    <p>No data yet.</p>
                </div>
                <button id="clear-stats" class="secondary-btn">Clear Local Stats</button>
                <button id="back-to-menu" class="secondary-btn">Back to Menu</button>
            </div>
        </main>
